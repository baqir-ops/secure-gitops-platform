apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secure-gitops-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/baqir-ops/secure-gitops-platform.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
