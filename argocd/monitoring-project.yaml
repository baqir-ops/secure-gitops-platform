apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: secure-gitops-platform
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

spec:
  description: Prometheus, Grafana and Alertmanager platform observability

  sourceRepos:
    - https://prometheus-community.github.io/helm-charts
    - https://github.com/baqir-ops/secure-gitops-platform.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: monitoring

    - server: https://kubernetes.default.svc
      namespace: argocd

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition

    - group: rbac.authorization.k8s.io
      kind: ClusterRole

    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration

    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration

  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap

    - group: ""
      kind: Pod

    - group: ""
      kind: Secret

    - group: ""
      kind: Service

    - group: ""
      kind: ServiceAccount

    - group: apps
      kind: DaemonSet

    - group: apps
      kind: Deployment

    - group: apps
      kind: StatefulSet

    - group: batch
      kind: Job

    - group: rbac.authorization.k8s.io
      kind: Role

    - group: rbac.authorization.k8s.io
      kind: RoleBinding

    - group: monitoring.coreos.com
      kind: Alertmanager

    - group: monitoring.coreos.com
      kind: Prometheus

    - group: monitoring.coreos.com
      kind: PrometheusRule

    - group: monitoring.coreos.com
      kind: ServiceMonitor

  orphanedResources:
    warn: true
